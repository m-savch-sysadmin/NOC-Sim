global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'snmp-routers'
    static_configs:
      - targets:
          - 172.20.20.2   # r1
          - 172.20.20.3   # r2
          - 172.20.20.4   # r3
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: snmp_exporter:9116
